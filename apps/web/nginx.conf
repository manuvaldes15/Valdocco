server {
  listen 80;
  server_name _;

  # Cabeceras de seguridad
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  root /usr/share/nginx/html;
  index index.html;

  # API → gateway (red interna de Docker)
  # resolver de Docker con TTL corto: re-resuelve la IP si el gateway se recrea
  resolver 127.0.0.11 valid=10s;

  location /api/ {
    set $gateway_upstream http://gateway:4000;
    proxy_pass $gateway_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA: cualquier ruta sirve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache de assets con hash
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
